global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: kong
    metrics_path: /metrics
    static_configs:
      - targets: ["kong:8001"]

  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  - job_name: n8n
    metrics_path: /metrics
    static_configs:
      - targets: ["hylono-n8n:5678"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://hylono-uptime-kuma:3001
          - http://kong:8000/medusa/health
          - http://kong:8000/lago
          - http://kong:8000/assets/login
          - http://kong:8000/cal
          - http://kong:8000/crm
          - http://kong:8000/documenso
          - http://kong:8000/auth/ui/v2/login/healthy
          - http://kong:8000/novu
          - http://kong:8000/automation/healthz
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
