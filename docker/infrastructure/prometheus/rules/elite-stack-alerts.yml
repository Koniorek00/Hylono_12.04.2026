groups:
  - name: hylono-control-plane
    rules:
      - alert: KongDown
        expr: up{job="kong"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Kong metrics are unavailable
          description: Prometheus cannot scrape the Kong admin metrics endpoint.

      - alert: PrometheusHttpProbeFailing
        expr: probe_success{job="blackbox-http"} == 0
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: One of the routed stack surfaces is failing probe checks
          description: The blackbox probe for {{ $labels.instance }} has been failing for at least 3 minutes.

      - alert: MinioMetricsMissing
        expr: up{job="minio"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: MinIO metrics are unavailable
          description: Prometheus cannot scrape the MinIO metrics endpoint.

      - alert: N8nMetricsMissing
        expr: up{job="n8n"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: n8n metrics are unavailable
          description: Prometheus cannot scrape the n8n metrics endpoint.
