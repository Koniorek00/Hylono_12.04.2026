networks:
  hylono:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  mongodata:
  uptimekuma:
  prometheusdata:

services:
  postgres:
    build:
      context: ./postgres
    container_name: hylono-postgres
    restart: unless-stopped
    stop_grace_period: 60s
    networks: [hylono]
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    env_file: ../../.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_partman_bgw
      - -c
      - max_connections=300
      - -c
      - shared_buffers=256MB
      - -c
      - wal_level=replica
      - -c
      - log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hylono-redis
    restart: unless-stopped
    stop_grace_period: 30s
    networks: [hylono]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --save
      - "900 1"
      - --save
      - "300 10"
      - --save
      - "60 10000"
      - --requirepass
      - ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hylono-minio
    restart: unless-stopped
    stop_grace_period: 60s
    networks: [hylono]
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    container_name: hylono-mongo
    restart: unless-stopped
    stop_grace_period: 60s
    networks: [hylono]
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodata:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: hylono
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "hylono",
          "--password",
          "${MONGO_ROOT_PASSWORD}",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand({ ping: 1 }).ok",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: hylono-uptime-kuma
    restart: unless-stopped
    stop_grace_period: 60s
    networks: [hylono]
    ports:
      - "127.0.0.1:3002:3001"
    environment:
      UPTIME_KUMA_DB_TYPE: sqlite
    volumes:
      - uptimekuma:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/setup-database-info').then(async (response) => { const body = await response.text(); process.exit(response.ok && body.includes('\"needSetup\":false') ? 0 : 1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  kong:
    image: kong:${KONG_IMAGE_TAG:-3.8}
    container_name: hylono-kong
    restart: unless-stopped
    stop_grace_period: 30s
    networks: [hylono]
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000 reuseport backlog=16384
      KONG_STATUS_LISTEN: 0.0.0.0:8100
      KONG_PLUGINS: bundled,prometheus,correlation-id
      KONG_NGINX_WORKER_PROCESSES: auto
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
      - "127.0.0.1:8101:8100"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 15s

  blackbox-exporter:
    image: prom/blackbox-exporter:${BLACKBOX_EXPORTER_IMAGE_TAG:-v0.25.0}
    container_name: hylono-blackbox-exporter
    restart: unless-stopped
    networks: [hylono]
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9115/-/healthy"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 10s

  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG:-v2.55.1}
    container_name: hylono-prometheus
    restart: unless-stopped
    stop_grace_period: 30s
    networks: [hylono]
    depends_on:
      blackbox-exporter:
        condition: service_healthy
      kong:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - prometheusdata:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 15s
