networks:
  hylono:
    driver: bridge
volumes:
  pgdata:
  redisdata:
  miniodata:
  mongodata:
  uptimekuma:

services:
  postgres:
    build:
      context: ./postgres
    container_name: hylono-postgres
    restart: unless-stopped
    networks: [hylono]
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    env_file: ../../.env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hylono-redis
    restart: unless-stopped
    networks: [hylono]
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hylono-minio
    restart: unless-stopped
    networks: [hylono]
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo:7
    container_name: hylono-mongo
    restart: unless-stopped
    networks: [hylono]
    ports: ["27017:27017"]
    volumes: [mongodata:/data/db]
    environment:
      MONGO_INITDB_ROOT_USERNAME: hylono
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: hylono-uptime-kuma
    restart: unless-stopped
    networks: [hylono]
    ports: ["3002:3001"]
    environment:
      UPTIME_KUMA_DB_TYPE: sqlite
    volumes: [uptimekuma:/app/data]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/setup-database-info').then(async (response) => { const body = await response.text(); process.exit(response.ok && body.includes('\"needSetup\":false') ? 0 : 1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
