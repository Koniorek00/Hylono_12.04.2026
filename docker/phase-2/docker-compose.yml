networks:
  hylono:
    external: true
    name: infrastructure_hylono

volumes:
  appsmith_stacks:

services:
  metabase:
    image: metabase/metabase:${METABASE_IMAGE_TAG:-v0.59.5}
    container_name: hylono-metabase
    restart: unless-stopped
    networks: [hylono]
    ports:
      - "127.0.0.1:8220:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_db
      MB_DB_PORT: "5432"
      MB_DB_USER: metabase
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: postgres
      MB_SITE_URL: http://127.0.0.1:8220
      MB_ANON_TRACKING_ENABLED: "false"
      JAVA_TIMEZONE: Europe/Warsaw
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s

  appsmith:
    image: appsmith/appsmith-ee:${APPSMITH_IMAGE_TAG:-v1.98}
    container_name: hylono-appsmith
    restart: unless-stopped
    networks: [hylono]
    ports:
      - "127.0.0.1:8221:80"
    volumes:
      - appsmith_stacks:/appsmith-stacks
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost/",
        ]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 90s
