# Repo-local Codex configuration for Hylono SEO work.
# Keep this file portable: prefer MCP servers that other operators can activate with env vars.

[mcp_servers.filesystem]
command = "cmd"
args = [
  "/c",
  "npx",
  "-y",
  "@modelcontextprotocol/server-filesystem",
  "f:/ag projects/Hylono_MAIN - SEO BOOST",
]

[mcp_servers.context7]
command = "cmd"
args = ["/c", "npx", "-y", "@upstash/context7-mcp"]

[mcp_servers.github]
command = "cmd"
args = ["/c", "npx", "-y", "@modelcontextprotocol/server-github"]

[mcp_servers.github.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_PERSONAL_ACCESS_TOKEN}"

[mcp_servers."semgrep-mcp"]
command = "cmd"
args = ["/c", "semgrep", "mcp", "--transport", "stdio"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.similarweb]
url = "https://mcp.similarweb.com"

[mcp_servers.similarweb.env_http_headers]
"api-key" = "${SIMILARWEB_API_KEY}"

[mcp_servers.notebooklm]
command = "npx"
args = ["-y", "notebooklm-mcp@latest"]
