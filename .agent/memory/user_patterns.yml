## Task Preferences

```yaml
what_user_values_most:
  1. "Innovation over convention"
  2. "Self-awareness and learning"
  3. "Comprehensive completion (85%+ not 50%)"
  4. "Systems that evolve autonomously"
  5. "Proof and validation (tests, artifacts)"
  
task_patterns:
  architecture_work:
    - User wants complete system design
    - Not just features, but consciousness layers
    - Integration of feedback loops
    - Evolution mechanisms built-in
    
  validation_work:
    - User wants proof systems work
    - Reversible tests appreciated
    - Comprehensive coverage expected
    - Real demonstrations, not hypotheticals

# BLOCKLIST - Do NOT Recommend These
blocked_suggestions:
  roi_calculator:
    status: "ON HOLD"
    reason: "User explicitly said 'don't want for now'"
    until: "User explicitly asks for it"
    added: "2026-01-18"
    notes: "Was used in Test 6 E2E example - user flagged not to suggest in real implementation"
```

