<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>
  
  <!-- Logo mark -->
  <g transform="translate(40, 40)">
    <!-- Hexagon shape -->
    <polygon points="50,0 100,25 100,75 50,100 0,75 0,25" fill="url(#logoGradient)"/>
    <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="#0f172a"/>
    <circle cx="50" cy="50" r="20" fill="url(#logoGradient)"/>
    <circle cx="50" cy="50" r="10" fill="#0f172a"/>
  </g>
</svg>