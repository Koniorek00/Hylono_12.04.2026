<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="200" fill="url(#glowGrad)"/>
  <circle cx="1100" cy="530" r="200" fill="url(#glowGrad)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Logo mark -->
  <g transform="translate(80, 200)">
    <polygon points="50,0 100,25 100,75 50,100 0,75 0,25" fill="url(#accentGrad)"/>
    <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" fill="#0f172a"/>
    <circle cx="50" cy="50" r="20" fill="url(#accentGrad)"/>
    <circle cx="50" cy="50" r="10" fill="#0f172a"/>
  </g>
  
  <!-- Brand name -->
  <text x="200" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white">HYLONO</text>
  
  <!-- Tagline -->
  <text x="200" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">Bio-Optimization Technology Platform</text>
  
  <!-- Feature badges -->
  <g transform="translate(200, 400)">
    <rect x="0" y="0" width="140" height="40" rx="20" fill="#06b6d4" opacity="0.2"/>
    <text x="70" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">HBOT</text>
    
    <rect x="160" y="0" width="140" height="40" rx="20" fill="#06b6d4" opacity="0.2"/>
    <text x="230" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">PEMF</text>
    
    <rect x="320" y="0" width="140" height="40" rx="20" fill="#06b6d4" opacity="0.2"/>
    <text x="390" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">Red Light</text>
    
    <rect x="480" y="0" width="140" height="40" rx="20" fill="#06b6d4" opacity="0.2"/>
    <text x="550" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle">Hydrogen</text>
  </g>
  
  <!-- URL -->
  <text x="600" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">hylono.com</text>
</svg>