name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm typecheck

      - name: Biome check
        run: pnpm exec biome check .

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Check bundle size
        run: |
          if [ -d ".next" ]; then
            BUILD_DIR=".next"
          elif [ -d "dist" ]; then
            BUILD_DIR="dist"
          else
            echo "❌ Could not find build output directory (.next or dist)."
            exit 1
          fi

          BUILD_SIZE=$(du -sb "$BUILD_DIR" | cut -f1)
          echo "Total build size (${BUILD_DIR}): ${BUILD_SIZE} bytes"
          # Fail if build exceeds 5MB (uncompressed)
          if [ "$BUILD_SIZE" -gt 5242880 ]; then
            echo "❌ Build size ${BUILD_SIZE} exceeds 5MB limit"
            exit 1
          fi
          echo "✅ Build size OK: ${BUILD_SIZE} bytes"
