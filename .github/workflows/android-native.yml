name: Android Native

on:
  push:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'

jobs:
  android-native:
    name: android-native build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Verify Android SDK
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$ANDROID_HOME}"

      - name: Assemble debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Lint debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: ./gradlew :app:lintDebug --console=plain

      - name: Unit tests
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: ./gradlew :app:testDebugUnitTest --console=plain
